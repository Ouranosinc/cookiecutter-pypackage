name: Workflow Changes Warnings

on:
  # Note: potential security risk from this action using pull_request_target.
  # Do not add actions in here which need a checkout of the repo, and do not use any caching in here.
  # See: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#pull_request_target
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - .github/workflows/*.yml

permissions:
  contents: read

concurrency:
  group: workflow-warning-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  comment-concerning-workflow-changes:
    name: Comment Concerning Workflow Changes
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    permissions:
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443

      - name: Create or Update Warning Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          MARKER="<!-- workflow-changes-warning -->"

          BODY=$(cat <<EOF
          $MARKER

          > [!WARNING]
          > This pull request modifies GitHub Actions workflows and originates from a fork.
          >
          > Review the workflow changes carefully before approving or merging.
          EOF
          )

          COMMENTS=$(gh api repos/$REPO/issues/$PR_NUMBER/comments)

          mapfile -t IDS < <(
            echo "$COMMENTS" |
            jq -r '
              .[]
              | select(.body | contains("<!-- workflow-changes-warning -->"))
              | .id
            '
          )

          COMMENT_ID=""

          if [ "${#IDS[@]}" -gt 0 ]; then
            COMMENT_ID="${IDS[0]}"

            # Remove duplicate managed comments if they exist.
            for id in "${IDS[@]:1}"; do
              gh api \
                --method DELETE \
                repos/$REPO/issues/comments/$id
            done
          fi

          if [ -n "$COMMENT_ID" ]; then
            gh api \
              --method PATCH \
              repos/$REPO/issues/comments/$COMMENT_ID \
              -f body="$BODY"
          else
            gh api \
              --method POST \
              repos/$REPO/issues/$PR_NUMBER/comments \
              -f body="$BODY"
          fi