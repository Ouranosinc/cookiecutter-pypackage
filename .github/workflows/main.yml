name: cookiecutter-pypackage testing

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  # For a given workflow, if we push to the same branch, cancel all previous builds on that branch except on main.
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  tests:
    name: Python${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14", "pypy3.11" ]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          # PyPy packages requires access to Rust binaries
          allowed-endpoints: >
            api.github.com:443
            cdn.fwupd.org:443
            dl.google.com:443
            downloads.python.org:443
            files.pythonhosted.org:443
            github.com:443
            go.dev:443
            index.crates.io:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            pypi.org:443
            static.crates.io:443
            storage.googleapis.com:443

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CI dependencies
        run: |
          python -m pip install --require-hashes -r CI/requirements_ci.txt

      - name: Environment Caching
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .tox
          key: ${{ matrix.tox-env }}-${{ hashFiles('pyproject.toml') }}

      - name: Run bake test suite
        run:
          python -m tox
        env:
          TOX_GH_MAJOR_MINOR: ${{ matrix.python-version }}
