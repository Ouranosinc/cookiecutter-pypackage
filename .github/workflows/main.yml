name: cookiecutter-pypackage testing

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  # For a given workflow, if we push to the same branch, cancel all previous builds on that branch except on main.
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  tests:
    name: Python${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14", "pypy3.11" ]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          disable-sudo: true
          egress-policy: block
          # PyPy packages requires access to Rust binaries
          allowed-endpoints: >
            api.github.com:443
            cdn.fwupd.org:443
            dl.google.com:443
            downloads.python.org:443
            files.pythonhosted.org:443
            github.com:443
            go.dev:443
            index.crates.io:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            pypi.org:443
            static.crates.io:443
            storage.googleapis.com:443
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install CI dependencies
        run: |
          python -m pip install --require-hashes -r CI/requirements_ci.txt
      - name: Environment Caching
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .tox
          key: ${{ matrix.tox-env }}-${{ hashFiles('pyproject.toml') }}
      - name: Run bake test suite
        run:
          python -m tox
        env:
          TOX_GH_MAJOR_MINOR: ${{ matrix.python-version }}
